name: Sync upstream spec

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Sync vendored specification
        id: sync
        run: node scripts/sync.mjs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit if changed
        env:
          UPSTREAM_SHA: ${{ steps.sync.outputs.upstream_sha }}
        run: |
          if [ -n "$(git status --porcelain references)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add references
            git commit -m "Sync Agent Skills spec and guides from upstream @ ${UPSTREAM_SHA}"
            git push
          else
            echo "Already current."
          fi
